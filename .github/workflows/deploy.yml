name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cnqso-web-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Env
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        shell: bash
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER; do
            if [ -z "${!name}" ]; then
              echo "::notice::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          if [ -z "$DEPLOY_SSH_KEY" ] && [ -z "$DEPLOY_SSH_KEY_B64" ]; then
            echo "::notice::Missing GitHub Actions secret: DEPLOY_SSH_KEY or DEPLOY_SSH_KEY_B64"
            missing=1
          fi

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy until DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY are configured."
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "$DEPLOY_SSH_KEY_B64" ]; then
            printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 --decode > ~/.ssh/deploy_key
          else
            printf '%s\n' "$DEPLOY_SSH_KEY" | perl -pe 's/\\n/\n/g' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key

          expected_public_key="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDco5WFtt4KrrXDylFRNsugAleBwOKkWwTX4Ma3mlBGX"
          if ! actual_public_key="$(ssh-keygen -y -f ~/.ssh/deploy_key)"; then
            echo "::error::DEPLOY_SSH_KEY is not a valid private SSH key. Use the full contents of /home/asendio/.ssh/cnqso_github_actions_deploy."
            exit 1
          fi
          echo "Deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key
          if [ "$actual_public_key" != "$expected_public_key" ]; then
            echo "::error::DEPLOY_SSH_KEY does not match the authorized cnqso deploy key on the server."
            exit 1
          fi

          port="${DEPLOY_PORT:-22}"
          echo "Scanning SSH host key for $DEPLOY_HOST:$port"
          ssh-keyscan -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        if: steps.deploy_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          port="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
            -p "$port" \
            -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST"
