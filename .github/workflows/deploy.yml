name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cnqso-web-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Env
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        shell: bash
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::notice::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy until DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY are configured."
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" | perl -pe 's/\\n/\n/g' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          port="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        if: steps.deploy_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          port="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
            -p "$port" \
            -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST"
