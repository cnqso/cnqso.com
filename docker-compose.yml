services:
  web:
    build:
      context: ./go
      dockerfile: Dockerfile
    container_name: cnqso-web-server
    ports:
      - "127.0.0.1:1739:1738"
    environment:
      - CNQSO_PORT=:1738
      - CNQSO_UPLOAD_DIR=/app/uploads
      - CNQSO_COMPILE_TYPESCRIPT=false
    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:1738/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    volumes:
      - ./webm:/app/uploads
      - ./go/db:/app/db

    tmpfs:
      - /tmp
