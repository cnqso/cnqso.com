<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{.Title}} - cnqso blog</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            font-size: 16px;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0;
        }
        
        .post-meta {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        
        .post-content h1 {
            font-size: 22px;
            font-weight: bold;
            margin: 30px 0 15px 0;
        }
        
        .post-content h2 {
            font-size: 20px;
            font-weight: bold;
            margin: 25px 0 12px 0;
        }
        
        .post-content h3 {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0 10px 0;
        }
        
        .post-content p {
            margin: 15px 0;
        }
        
        .post-content a {
            color: #00f;
            text-decoration: underline;
        }
        
        .post-content a:visited {
            color: #551a8b;
        }
        
        .post-content pre {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 15px 0;
            overflow-x: auto;
            font-family: "Courier New", monospace;
            font-size: 14px;
        }
        
        .post-content code {
            font-family: "Courier New", monospace;
            font-size: 14px;
            background-color: #f0f0f0;
            padding: 2px 4px;
        }
        
        .post-content pre code {
            background-color: transparent;
            padding: 0;
        }
        
        .post-content blockquote {
            border-left: 3px solid #ccc;
            margin: 15px 0;
            padding-left: 15px;
            color: #666;
            font-style: italic;
        }
        
        .post-content ul, .post-content ol {
            margin: 15px 0;
            padding-left: 30px;
        }
        
        .post-content li {
            margin: 5px 0;
        }
        
        .footnotes {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 14px;
            color: #666;
        }
        
        .footnotes ol {
            padding-left: 20px;
        }
        
        hr {
            border: none;
            border-top: 1px solid #000;
            margin: 30px 0;
        }
        
        .nav-links {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
        }
        
        .nav-link {
            color: #00f;
            text-decoration: underline;
            margin: 0 10px;
        }
        
        .nav-link:visited {
            color: #551a8b;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{.Title}}</h1>
        <div class="post-meta">{{.Date.Format "January 2, 2006"}}</div>
    </div>
    
    <div class="post-content">
        {{.Content}}
    </div>
    
    <hr>
    
    <div class="nav-links">
        <a href="/blog" class="nav-link">back</a>
    </div>
</body>
</html>
