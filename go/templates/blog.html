<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>cnqso.com blog</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            font-size: 16px;
            line-height: 1.4;
            color: #000;
            background-color: #fff;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0 0 30px 0;
            text-align: center;
        }
        
        hr {
            border: none;
            border-top: 1px solid #000;
            margin: 30px 0;
        }
        
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .post-item {
            margin-bottom: 20px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 15px;
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .post-link {
            color: #00f;
            text-decoration: underline;
            font-size: 18px;
        }
        
        .post-link:visited {
            color: #551a8b;
        }
        
        .post-date {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .nav-link {
            color: #00f;
            text-decoration: underline;
            font-size: 14px;
        }
        
        .nav-link:visited {
            color: #551a8b;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: #666;
        }
        
        .no-posts {
            text-align: center;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>blog</h1>
    
    {{if .Posts}}
        <ul class="post-list">
            {{range .Posts}}
            <li class="post-item">
                <a href="/blog/{{.Slug}}" class="post-link">{{.Title}}</a>
                <div class="post-date">{{.Date.Format "January 2, 2006"}}</div>
            </li>
            {{end}}
        </ul>
    {{else}}
        <div class="no-posts">
            <p>No posts yet.</p>
        </div>
    {{end}}
    
    <hr>
    
    <div class="footer">
        <a href="/" class="nav-link">home</a>
    </div>
</body>
</html>
